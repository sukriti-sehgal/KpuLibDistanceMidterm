
<!DOCTYPE html>
<html>
<head>
  <title>KPU Surrey Library Distance App</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    #map {
      height: 500px;
      width: 100%;
      margin-top: 15px;
    }

    #result {
      font-size: 18px;
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <h2>Distance to KPU Surrey Library</h2>

  <button onclick="getLocation()">Show My Location</button>

  <p id="result">Click the button to calculate distance.</p>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const kpuLat = 49.1329;
    const kpuLon = -122.8716;

    let map = L.map('map').setView([kpuLat, kpuLon], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: 'OpenStreetMap'
    }).addTo(map);

    L.marker([kpuLat, kpuLon])
      .addTo(map)
      .bindPopup("KPU Surrey Library")
      .openPopup();

    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showPosition, showError);
      } else {
        document.getElementById("result").innerHTML =
          "Geolocation is not supported by this browser.";
      }
    }

    function showPosition(position) {
      const userLat = position.coords.latitude;
      const userLon = position.coords.longitude;

      L.marker([userLat, userLon])
        .addTo(map)
        .bindPopup("Your Current Location")
        .openPopup();

      map.setView([userLat, userLon], 13);

      const distance = calculateDistance(userLat, userLon, kpuLat, kpuLon);

      document.getElementById("result").innerHTML =
        "Your distance to KPU Surrey Library is " + distance.toFixed(2) + " km.";
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = toRadians(lat2 - lat1);
      const dLon = toRadians(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRadians(lat1)) *
        Math.cos(toRadians(lat2)) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    function toRadians(degrees) {
      return degrees * Math.PI / 180;
    }

    function showError(error) {
      document.getElementById("result").innerHTML =
        "Please allow location permission to calculate the distance.";
    }
  </script>
</body>
</html>
